pluginManagement {
    repositories {
        mavenLocal()
        mavenCentral()
        gradlePluginPortal()
    }
    plugins {
        id 'org.siouan.frontend-jdk21' version '9.1.0'
    }
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == 'io.quarkus') {
                useModule("io.quarkus:io.quarkus.gradle.plugin:${requested.version}")
            }
        }
    }
}
rootProject.name='dicoop'
